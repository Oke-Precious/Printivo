<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printivo</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>
    <header class=" header align-items-center d-flex py-lg-2 px-lg-5 px-sm-5  justify-content-between">
        <ul class="d-flex list-unstyled costCal gap-lg-4">
            <li><a href="#">Cost Calculator</a></li>
            <li><a href="#">Discover Stores</a></li>
            <li><a href="#">Track Orders</a></li>
        </ul>
        <div class=" gap-lg-4 d-flex needHelp align-items-center gap-sm-4">
            <ul class="list-unstyled">
                <li>Need help? Call:</li>
                <li class="d-flex gap-lg-1 gap-sm-1 gap-md-1">
                    <a href="#" class="text-primary fw-semibold">+2347069000083</a> 
                    <span>or</span>
                    <a href="#" class="text-primary fw-semibold">+2349035000505</a>
                </li>
            </ul>
            <img src="./media/whatsappicon.svg" alt="" class="whatsappIcon">
            <button class="btn btn-outline-secondary px-3 py-2 text-black rounded-5"><img src="./media/nigeriaflag.svg" alt=""> Nigeria</button>
            <button class="btn btn-outline-secondary px-3 py-2 text-black rounded-5"><img src="./media/ukflag.svg" alt=""> UK</button>
        </div>
    </header>
    
    <nav class="navbar align-items-center px-lg-5 px-sm-5 py-3">
        <img src="./media/printivologo.svg" class="logo" alt="">
        <div class="d-flex gap-lg-3 gap-sm-3 align-items-center">
            <ul class="list-unstyled d-flex gap-lg-3 gap-sm-3">
                <li><a href="#">All Products</a></li>
                <li><a href="#">Become a Reseller</a></li>
                <li><a href="#">Merch Store</a></li>
                <li><a href="#">Marketplace</a></li>
            </ul>
            <p class="btn fw-medium text-danger">Sign in</p>
            <p class="btn fw-normal ">Create Account</p>
            <img src="./media/cart.svg" alt="" class="cart">
        </div>
    </nav>

    <section class="d-flex sec1 justify-content-between px-lg-5 px-sm-5 py-3">
        <div class="w-50">
            <h1>Quality Prints</h1>
            <h3 class="my-3">Shipped to your doorstep</h3>

            <div class="mt-5">
                <p class="fw-semibold my-1">What would you like to print today?</p>
                <div class="inputCon px-4 py-4 rounded">
                    <input type="text" placeholder="Search for Business cards, T-shirts, Mugs, etc">
                    <button class="btn"><img src="./media/searchicon.svg" alt=""></button>
                </div>
            </div>
        </div>
        <div></div>
    </section>
    
    






    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
